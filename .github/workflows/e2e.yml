name: E2E Tests

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'playwright.config.*'
  pull_request:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'playwright.config.*'

jobs:
  e2e:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Playwright config
        id: check
        run: |
          if [ -f "apps/web/playwright.config.ts" ] || [ -f "playwright.config.ts" ]; then
            echo "has_playwright=true" >> $GITHUB_OUTPUT
          else
            echo "has_playwright=false" >> $GITHUB_OUTPUT
            echo "No Playwright config found — skipping E2E tests"
          fi

      - uses: pnpm/action-setup@v4
        if: steps.check.outputs.has_playwright == 'true'
        with:
          version: 9
          run_install: false

      - uses: actions/setup-node@v6
        if: steps.check.outputs.has_playwright == 'true'
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        if: steps.check.outputs.has_playwright == 'true'
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        if: steps.check.outputs.has_playwright == 'true'
        run: npx playwright install --with-deps chromium

      - name: Build Next.js
        if: steps.check.outputs.has_playwright == 'true'
        run: pnpm build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Run E2E tests
        if: steps.check.outputs.has_playwright == 'true'
        run: npx playwright test --project=chromium
        env:
          CI: true

      - uses: actions/upload-artifact@v4
        if: ${{ steps.check.outputs.has_playwright == 'true' && !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - uses: actions/upload-artifact@v4
        if: ${{ steps.check.outputs.has_playwright == 'true' && !cancelled() }}
        with:
          name: test-results
          path: test-results/
          retention-days: 14

name: Security

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1'

jobs:
  security:
    uses: hansbeeksma/release-infrastructure/.github/workflows/reusable-security.yml@main
    with:
      run-semgrep: true
      # npm-based checks disabled: monorepo uses pnpm (no package-lock.json)
      # TODO: update reusable-security.yml to support pnpm package manager
      run-npm-audit: false
      run-snyk: false
      run-sbom: true
      run-license-check: false
      # Single config to avoid shell expansion bug with space-separated rulesets
      semgrep-rules: "p/security-audit"
    secrets: inherit

  notify-on-failure:
    needs: [security]
    if: failure()
    uses: hansbeeksma/release-infrastructure/.github/workflows/reusable-notify.yml@main
    with:
      workflow-name: "Security"
      workflow-status: "failure"
    secrets: inherit

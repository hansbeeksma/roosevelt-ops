# Roosevelt OPS - Shared Gitleaks Configuration
# Copy to project root for CI availability
# Extends default gitleaks rules with custom patterns

title = "Roosevelt OPS Gitleaks Config"

[extend]
# Use default gitleaks rules as base
useDefault = true

# Custom rules for our stack
[[rules]]
id = "stripe-live-key"
description = "Stripe Live Secret Key"
regex = '''sk_live_[a-zA-Z0-9]{20,}'''
tags = ["stripe", "secret", "critical"]

[[rules]]
id = "stripe-test-key"
description = "Stripe Test Secret Key"
regex = '''sk_test_[a-zA-Z0-9]{20,}'''
tags = ["stripe", "secret"]

[[rules]]
id = "stripe-restricted-key"
description = "Stripe Restricted Key"
regex = '''rk_(live|test)_[a-zA-Z0-9]{20,}'''
tags = ["stripe", "secret"]

[[rules]]
id = "stripe-webhook-secret"
description = "Stripe Webhook Secret"
regex = '''whsec_[a-zA-Z0-9]{20,}'''
tags = ["stripe", "secret"]

[[rules]]
id = "supabase-service-role"
description = "Supabase Service Role Key"
regex = '''eyJ[a-zA-Z0-9_-]{50,}\.eyJ[a-zA-Z0-9_-]{50,}\.[\w-]{50,}'''
tags = ["supabase", "jwt", "secret"]
[rules.allowlist]
paths = [
  '''package-lock\.json''',
  '''pnpm-lock\.yaml''',
  '''yarn\.lock''',
  '''\.test\.(ts|js|tsx|jsx)$''',
  '''__tests__/''',
  '''\.spec\.(ts|js|tsx|jsx)$''',
]

[[rules]]
id = "sendgrid-api-key"
description = "SendGrid API Key"
regex = '''SG\.[a-zA-Z0-9_-]{22}\.[a-zA-Z0-9_-]{43}'''
tags = ["sendgrid", "secret"]

[[rules]]
id = "printify-api-key"
description = "Printify API Key (JWT)"
regex = '''eyJ[a-zA-Z0-9_-]+\.eyJ[^"'\s]{100,}'''
tags = ["printify", "jwt", "secret"]
[rules.allowlist]
paths = [
  '''package-lock\.json''',
  '''pnpm-lock\.yaml''',
  '''yarn\.lock''',
]

[[rules]]
id = "shopify-access-token"
description = "Shopify Access Token"
regex = '''shpat_[a-fA-F0-9]{32}'''
tags = ["shopify", "secret"]

[[rules]]
id = "generic-api-key"
description = "Generic API key pattern (overrides default with test-file allowlist)"
regex = '''(?i)(api[_-]?key|apikey|api[_-]?secret)['\":\s=]+['\"a-zA-Z0-9/\-_]{16,}'''
tags = ["generic", "secret"]
[rules.allowlist]
paths = [
  '''\.test\.(ts|js|tsx|jsx)$''',
  '''\.spec\.(ts|js|tsx|jsx)$''',
  '''__tests__/''',
]
regexes = ['''# gitleaks:allow''']

[[rules]]
id = "jwt"
description = "JSON Web Token (overrides default with test-file allowlist)"
regex = '''eyJ[a-zA-Z0-9_-]{10,}\.eyJ[a-zA-Z0-9_-]{10,}\.[a-zA-Z0-9_-]{10,}'''
tags = ["jwt", "secret"]
[rules.allowlist]
paths = [
  '''\.test\.(ts|js|tsx|jsx)$''',
  '''\.spec\.(ts|js|tsx|jsx)$''',
  '''__tests__/''',
]
regexes = ['''# gitleaks:allow''']

# Global allowlist
[allowlist]
paths = [
  '''node_modules/''',
  '''\.next/''',
  '''dist/''',
  '''build/''',
  '''\.turbo/''',
  '''package-lock\.json''',
  '''pnpm-lock\.yaml''',
  '''yarn\.lock''',
  '''\.gitleaks\.toml''',
  '''\.github/workflows/''',
  '''\.test\.(ts|js|tsx|jsx)$''',  # Test files may contain fake secrets
  '''\.spec\.(ts|js|tsx|jsx)$''',  # Spec files may contain fake secrets
  '''__tests__/''',  # Test directories
  '''docs/IDE-SECURITY-SETUP\.md''',
  '''docs/SECURITY\.md''',  # Security documentation with examples
  '''docs/SETUP\.md''',  # Setup documentation with example JWT placeholders
  '''\.figma-workflow\.json''',  # Figma file keys (public URLs)
  '''docs/design/05-figma-workflow\.md''',  # Design workflow with Figma file keys
]
regexes = [
  '''D9lhL1k3Hz3RuBXPyZ4zXJ''',  # Figma Claude-Designs file key (public identifier in URL)
]
